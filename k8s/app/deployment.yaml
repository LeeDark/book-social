apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: book-social-api
  name: book-social-api
  namespace: default
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: book-social-api
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: book-social-api
    spec:
      volumes:
        - name: sqlite-data
          persistentVolumeClaim:
            claimName: book-social-api-data
      containers:
      - envFrom:
        - configMapRef:
            name: book-social-api-config
        image: book-social:dev
        imagePullPolicy: IfNotPresent
        name: book-social-api
        volumeMounts:
          - mountPath: /app/data
            name: sqlite-data
        ports:
        - containerPort: 8080
          protocol: TCP
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8080
          periodSeconds: 5
          timeoutSeconds: 1
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          periodSeconds: 10
          timeoutSeconds: 1
          failureThreshold: 3
      restartPolicy: Always
